version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - prod_net
    restart: unless-stopped
    # NOT exposed to host

  api:
    build:
      context: ./packages/server
      target: prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
    depends_on:
      - postgres
    networks:
      - prod_net
    restart: unless-stopped
    # NOT exposed to host — Nginx proxies to it

  client:
    build:
      context: ./packages/client
      target: prod
    networks:
      - prod_net
    restart: unless-stopped
    # NOT exposed to host — Nginx proxies to it

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro # SSL certs via Certbot
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - api
      - client
    networks:
      - prod_net
    restart: unless-stopped

networks:
  prod_net:
    driver: bridge

volumes:
  postgres_prod_data:
  certbot_webroot:
