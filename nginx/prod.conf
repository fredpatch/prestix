# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name PLACEHOLDER-DOMAIN.com;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name PLACEHOLDER-DOMAIN.com;

    ssl_certificate     /etc/letsencrypt/live/PLACEHOLDER-DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/PLACEHOLDER-DOMAIN.com/privkey.pem;

    # Frontend
    location / {
        proxy_pass http://client:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;     # for file uploads (invoices, docs)
    }
}
